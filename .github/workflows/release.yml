name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build EXE
        run: |
          pyinstaller --name "OledWallpaperMagic" --onedir --windowed --add-data "icons;icons" --hidden-import=PySide6 --hidden-import=PySide6.QtCore --hidden-import=PySide6.QtGui --hidden-import=PySide6.QtWidgets src/oled_wallpaper_magic/__main__.py

      - name: Create ZIP
        shell: bash
        run: |
          cd dist
          zip -r OledWallpaperMagic-windows.zip OledWallpaperMagic/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/OledWallpaperMagic-windows.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
