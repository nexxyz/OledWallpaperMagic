name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --clean --name "OledWallpaperMagic" --onefile --windowed --add-data "icons;icons" --add-data "presets;presets" --collect-all typer --collect-all click --collect-all rich --collect-all pydantic --collect-all tomli_w --collect-all shellingham --hidden-import=PySide6 --hidden-import=PySide6.QtCore --hidden-import=PySide6.QtGui --hidden-import=PySide6.QtWidgets src/oled_wallpaper_magic/__main__.py

      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist\OledWallpaperMagic.exe" -DestinationPath "dist\OledWallpaperMagic-windows.zip" -Force

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OledWallpaperMagic-windows.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
